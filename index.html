<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>saveHXPE // LYRIC ENGINE</title>
    <link href="./output.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="min-h-screen flex flex-col overflow-hidden select-none">

    <!-- TOP BAR -->
    <header class="h-14 border-b border-white/5 flex justify-between items-center px-6 z-50 bg-[#0A0A0A]">
        <div class="font-['Space_Grotesk'] font-black text-lg tracking-[0.2em] uppercase">saveHXPE // LYRIC ENGINE</div>
        <div class="flex items-center space-x-6">
            <button onclick="togglePanel('history')" class="text-[10px] font-black tracking-widest uppercase hover:text-white text-gray-500 transition-all flex items-center">
                <span class="material-symbols-outlined text-sm mr-2">history</span> ARCHIVE
            </button>
            <button onclick="togglePanel('settings')" class="text-[10px] font-black tracking-widest uppercase hover:text-white text-gray-500 transition-all flex items-center">
                <span class="material-symbols-outlined text-sm mr-2">settings</span> CONFIG
            </button>
        </div>
    </header>

    <!-- MAIN STUDIO -->
    <main class="flex-1 flex relative overflow-hidden">
        
        <!-- HISTORY/RMD PANEL (LEFT SLIDE) -->
        <aside id="panel-history" class="panel-slide panel-history-hidden absolute left-0 top-0 w-80 h-full bg-[#0F0F0F] border-r border-white/5 z-40 flex flex-col">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <div class="flex space-x-6">
                    <button id="tab-history" onclick="toggleSidebarTab('history')" class="text-[10px] font-black tracking-widest text-white uppercase">ARCHIVE</button>
                    <button id="tab-rmd" onclick="toggleSidebarTab('rmd')" class="text-[10px] font-black tracking-widest text-gray-500 uppercase">RMD_DB</button>
                </div>
                <button onclick="togglePanel('history')" class="material-symbols-outlined text-sm">close</button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto p-4 space-y-2">
                <!-- History Items -->
            </div>
            <div id="rmd-list" class="flex-1 overflow-y-auto p-4 space-y-2 hidden">
                <!-- RMD Items -->
            </div>
        </aside>

        <!-- SETTINGS PANEL (RIGHT SLIDE) -->
        <aside id="panel-settings" class="panel-slide panel-hidden absolute right-0 top-0 w-80 h-full bg-[#0F0F0F] border-l border-white/5 z-40 flex flex-col">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <span class="text-[10px] font-black tracking-widest uppercase">SYSTEM_CONFIG</span>
                <button onclick="togglePanel('settings')" class="material-symbols-outlined text-sm">close</button>
            </div>
            <div class="flex-1 overflow-y-auto p-8 space-y-10">
                <div class="space-y-4">
                    <label class="text-[9px] font-black tracking-widest text-gray-500 uppercase">API_KEY</label>
                    <input type="password" id="api-key-input" placeholder="GEMINI_UPLINK_KEY" class="w-full bg-black border border-white/10 p-3 text-xs font-mono focus:border-white focus:ring-0" autocomplete="off" onchange="updateSetting('apiKey', this.value)">
                </div>
                <div class="space-y-4">
                    <label class="flex justify-between text-[9px] font-black tracking-widest text-gray-500 uppercase">
                        OUTSIDER_INTENSITY <span id="val-outsider" class="text-white">84</span>
                    </label>
                    <input id="range-outsider" type="range" max="100" min="0" value="84" oninput="updateSetting('outsiderIntensity', this.value)">
                </div>
                <div class="space-y-4">
                    <label class="flex justify-between text-[9px] font-black tracking-widest text-gray-500 uppercase">
                        RHYME_DENSITY <span id="val-rhyme" class="text-white">70</span>
                    </label>
                    <input id="range-rhyme" type="range" max="100" min="0" value="70" oninput="updateSetting('rhymeDensity', this.value)">
                </div>
                <div class="space-y-4">
                    <label class="text-[9px] font-black tracking-widest text-gray-500 uppercase">LOCALIZATION</label>
                    <div class="grid grid-cols-3 border border-white/10">
                        <button onclick="updateSetting('localization', 'LESOTHO')" class="loc-btn py-2 text-[8px] font-black uppercase" data-loc="LESOTHO">LSO</button>
                        <button onclick="updateSetting('localization', 'AFRICAN')" class="loc-btn py-2 text-[8px] font-black border-x border-white/10 uppercase" data-loc="AFRICAN">AFR</button>
                        <button onclick="updateSetting('localization', 'GLOBAL')" class="loc-btn py-2 text-[8px] font-black uppercase" data-loc="GLOBAL">GLO</button>
                    </div>
                </div>
                <div class="pt-8 border-t border-white/5">
                    <button onclick="clearState()" class="w-full border border-red-900/40 text-red-900 hover:text-red-500 hover:border-red-500 py-3 text-[9px] font-black transition-all">PURGE_DATA</button>
                </div>
            </div>
        </aside>

        <!-- CORE CONTENT -->
        <div class="flex-1 flex flex-col md:flex-row overflow-hidden bg-[#0A0A0A]">
            <!-- INPUT AREA -->
            <section class="flex-1 flex flex-col p-8 border-r border-white/5 relative">
                <div class="flex justify-between items-center mb-4">
                    <div class="text-[10px] font-black tracking-widest text-gray-600 uppercase">RAW_DATA_INPUT <span id="session-id-display" class="ml-2 text-white/20"></span></div>
                    <button onclick="newSession()" class="text-[9px] font-black border border-white/10 px-3 py-1 hover:bg-white hover:text-black transition-all">NEW_START</button>
                </div>
                <textarea id="input-lyrics" oninput="handleInput(this.value)" class="flex-1 bg-transparent border-0 focus:ring-0 p-0 text-xl font-medium leading-relaxed placeholder:text-white/5 resize-none" placeholder="START WRITING OR PASTE DATA..."></textarea>
                
                <!-- Action Buttons Overlay -->
                <div class="absolute right-0 top-1/2 -translate-y-1/2 flex flex-col space-y-2 z-10 px-4">
                    <button id="btn-write" onclick="runEngine()" class="w-14 h-48 bg-white text-black flex items-center justify-center hover:bg-gray-200 transition-all font-black group">
                        <span id="btn-write-text" class="vertical-text">WRITE</span>
                    </button>
                    <button id="btn-refine" onclick="refineLyrics()" class="w-14 h-48 bg-black border border-white/10 text-white flex items-center justify-center hover:bg-white hover:text-black transition-all font-black group">
                        <span id="btn-refine-text" class="vertical-text">REFINE</span>
                    </button>
                </div>
            </section>

            <!-- OUTPUT AREA -->
            <section class="flex-1 flex flex-col bg-[#0F0F0F] relative overflow-hidden">
                <div class="flex justify-between items-center p-6 border-b border-white/5 bg-[#0F0F0F] z-10">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black tracking-widest uppercase">ELEVATED_OUTPUT</span>
                        <div id="version-stack" class="flex space-x-1 mt-2"></div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div class="flex items-center bg-black border border-white/5 px-3 py-1">
                            <span class="text-[8px] font-black mr-2 opacity-30">BPM</span>
                            <input type="number" id="bpm-input" value="90" class="bg-transparent border-0 w-8 p-0 text-[10px] font-black focus:ring-0" onchange="updateSetting('bpm', this.value)">
                        </div>
                        <button onclick="togglePerformance()" id="btn-perf" class="text-[9px] font-black border border-white/10 px-4 py-1.5 hover:bg-white hover:text-black transition-all uppercase">PERFORMANCE_OFF</button>
                    </div>
                </div>
                <div id="output-lyrics" class="flex-1 p-10 overflow-y-auto text-xl leading-relaxed whitespace-pre-wrap font-medium">
                    <div class="text-white/5 italic">FEED SYSTEM DATA TO BEGIN_</div>
                </div>
                
                <!-- Rhyme Harvester Slide -->
                <div id="harvest-panel" class="hidden absolute bottom-6 left-6 right-6 bg-white text-black p-4 flex justify-between items-center shadow-2xl z-30 slide-up">
                    <div class="flex flex-col overflow-hidden">
                        <span class="text-[8px] font-black uppercase opacity-40">HARVEST_CHAIN_DETECTED</span>
                        <span id="harvest-chain-text" class="text-sm font-bold truncate">...</span>
                    </div>
                    <button onclick="acceptHarvest()" class="bg-black text-white px-4 py-2 text-[10px] font-black uppercase tracking-tighter hover:bg-white hover:text-black border border-black transition-all">SAVE_TO_RMD</button>
                </div>
            </section>
        </div>
    </main>

    <!-- FOOTER STATUS -->
    <footer class="h-8 border-t border-white/5 bg-[#0A0A0A] flex items-center justify-between px-6 z-50">
        <div class="flex items-center space-x-6">
            <div class="flex items-center space-x-2"><div id="status-pixel" class="w-1.5 h-1.5 bg-white"></div><span id="status-text" class="text-[8px] font-black tracking-[0.2em] uppercase text-gray-500">SYSTEM_CONNECTED</span></div>
            <span class="text-[8px] font-black tracking-[0.2em] uppercase text-gray-700">SES_ID: <span id="footer-sid">----</span></span>
        </div>
        <div class="flex items-center space-x-4">
            <span class="text-[8px] font-black tracking-[0.2em] uppercase text-gray-700">LOCALE: LESOTHO_UPLINK</span>
            <span id="time-display" class="text-[8px] font-black tracking-[0.2em] uppercase text-white">00:00:00</span>
        </div>
    </footer>

    <script shadow>
        const IDENTITY_CORE = `Name: saveHXPE. Origin: Lesotho. Aesthetic: Brutalist. Technical: Multis, internal chains, high-velocity. Style: Lesotho outsider, melancholic, aggressive. Strategy: Cultural nods, isolation, sharp wording.`;
        const BASE_PROMPT = `Act as saveHXPE engine. Rewrite technically. 4-syllable multis at end. 2+ internal rhymes per bar. Wrap rhymes in [[ ]]. Output lyrics only.`;

        let currentLoopId = 0;
        let state = {
            settings: { outsiderIntensity: 84, rhymeDensity: 70, localization: 'LESOTHO', apiKey: 'AIzaSyCniBkLos68De6AOhkJYb6hSenVvpMo7DE', bpm: 90 },
            history: [],
            rmd: [],
            currentInput: '',
            currentOutput: '',
            versions: [],
            sessionId: Math.random().toString(36).slice(2, 8).toUpperCase(),
            perf: { active: false, timer: null }
        };

        const $ = id => document.getElementById(id);

        function init() {
            const saved = localStorage.getItem('saveHXPE_V7');
            if (saved) state = { ...state, ...JSON.parse(saved) };
            
            $('input-lyrics').value = state.currentInput || '';
            $('session-id-display').innerText = state.sessionId;
            $('footer-sid').innerText = state.sessionId;
            
            if (state.currentOutput) {
                renderOutput(state.currentOutput);
                updateVersions();
            }
            
            applySettings();
            startTime();
            renderHistory();
            renderRMD();
        }

        function handleInput(v) { state.currentInput = v; save(); }

        function togglePanel(id) {
            const p = $('panel-' + id);
            const isRef = id === 'history';
            if (isRef) p.classList.toggle('panel-history-hidden');
            else p.classList.toggle('panel-hidden');
        }

        function toggleSidebarTab(tab) {
            const h = $('history-list');
            const r = $('rmd-list');
            const bh = $('tab-history');
            const br = $('tab-rmd');
            if (tab === 'history') {
                h.classList.remove('hidden'); r.classList.add('hidden');
                bh.classList.add('text-white'); bh.classList.remove('text-gray-500');
                br.classList.add('text-gray-500'); br.classList.remove('text-white');
            } else {
                r.classList.remove('hidden'); h.classList.add('hidden');
                br.classList.add('text-white'); br.classList.remove('text-gray-500');
                bh.classList.add('text-gray-500'); bh.classList.remove('text-white');
            }
            renderHistory();
            renderRMD();
        }

        async function runEngine() {
            const input = $('input-lyrics').value;
            if (!input.trim() || !state.settings.apiKey) return alert("UPLINK KEY REQUIRED");
            setLoading(true, 'write');
            try {
                const prompt = `${IDENTITY_CORE}\nSettings: ${JSON.stringify(state.settings)}\n${BASE_PROMPT}\nInput: ${input}`;
                const out = await callAI(prompt);
                state.versions = [{ text: out, time: new Date().toLocaleTimeString() }];
                state.currentOutput = out;
                state.history.unshift({ input, output: out, time: new Date().toLocaleString(), sid: state.sessionId });
                renderOutput(out, true);
                updateVersions();
                renderHistory();
                save();
            } catch (e) { renderOutput(e.message); }
            finally { setLoading(false, 'write'); }
        }

        async function refineLyrics() {
            if (!state.currentOutput || !state.settings.apiKey) return alert("NO DATA OR KEY");
            setLoading(true, 'refine');
            try {
                const prompt = `${IDENTITY_CORE}\nSettings: ${JSON.stringify(state.settings)}\nRefine instruction: Technical enhancement, keep core meaning. Multis. Internal chains.\nInput: ${state.currentOutput}`;
                const out = await callAI(prompt);
                state.versions.push({ text: out, time: new Date().toLocaleTimeString() });
                state.currentOutput = out;
                renderOutput(out, true);
                updateVersions();
                save();
            } catch (e) { renderOutput(e.message); }
            finally { setLoading(false, 'refine'); }
        }

        async function callAI(p) {
            try {
                const model = 'gemini-1.5-flash-latest';
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${state.settings.apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: p }] }] })
                });

                if (!r.ok) {
                    const errorData = await r.json();
                    console.error("Gemini API Error:", errorData);
                    throw new Error("API ERROR — CHECK KEY OR MODEL");
                }

                const d = await r.json();
                if (!d.candidates || !d.candidates[0].content || !d.candidates[0].content.parts[0].text) {
                    console.error("Malformed Response:", d);
                    throw new Error("API ERROR — CHECK KEY OR MODEL");
                }
                return d.candidates[0].content.parts[0].text;
            } catch (err) {
                console.error("Fetch Exception:", err);
                throw new Error("API ERROR — CHECK KEY OR MODEL");
            }
        }

        function renderOutput(text, typing = false) {
            const loopId = ++currentLoopId;
            const div = $('output-lyrics'); div.innerHTML = '';
            const lines = text.split('\n');
            
            // Check for harvesting
            const matches = text.match(/\[\[(.*?)\]\]/g);
            if (matches && matches.length > 1) showHarvest(matches[0].replace(/[\[\]]/g,'') + ' / ' + matches[1].replace(/[\[\]]/g,''));

            const display = async () => {
                for (let line of lines) {
                    if (loopId !== currentLoopId) return;
                    const l = document.createElement('div');
                    l.className = 'flow-line';
                    l.innerHTML = line.replace(/\[\[(.*?)\]\]/g, (m, p1) => `<span class="${Math.random() > 0.5 ? 'rhyme-highlight-1' : 'rhyme-highlight-2'}">${p1}</span>`);
                    div.appendChild(l);
                    if (typing) await new Promise(r => setTimeout(r, Math.random() * 50));
                }
                if (loopId !== currentLoopId) return;
                const cur = document.createElement('span'); cur.className = 'blinking-cursor';
                div.appendChild(cur);
            };
            display();
        }

        function updateVersions() {
            const v = $('version-stack'); v.innerHTML = '';
            state.versions.forEach((ver, i) => {
                const b = document.createElement('button');
                b.className = `w-6 h-6 text-[8px] font-black border ${state.currentOutput === ver.text ? 'bg-white text-black border-white' : 'border-white/10 text-white/20 hover:text-white'}`;
                b.innerText = `V${i + 1}`;
                b.onclick = () => { state.currentOutput = ver.text; renderOutput(ver.text); updateVersions(); };
                v.appendChild(b);
            });
        }

        function showHarvest(chain) {
            $('harvest-chain-text').innerText = chain;
            $('harvest-panel').classList.remove('hidden');
            setTimeout(() => $('harvest-panel').classList.add('hidden'), 8000);
        }

        function acceptHarvest() {
            const chain = $('harvest-chain-text').innerText;
            if (!state.rmd.find(r => r.chain === chain)) {
                state.rmd.unshift({ chain, time: Date.now() });
                save();
                renderRMD();
            }
            $('harvest-panel').classList.add('hidden');
        }

        function togglePerformance() {
            if (state.perf.active) stopPerf();
            else startPerf();
        }

        function startPerf() {
            const lines = $('output-lyrics').querySelectorAll('.flow-line');
            if (!lines.length) return;
            state.perf.active = true;
            const b = $('btn-perf');
            b.innerText = 'PERFORMANCE_ON'; b.classList.add('bg-white', 'text-black');
            
            lines.forEach(l => l.classList.add('perf-dim'));
            let cur = 0;
            const ms = (60000 / state.settings.bpm) * 4; // 1 bar at 4/4
            state.perf.timer = setInterval(() => {
                if (cur >= lines.length) return stopPerf();
                if (cur > 0) lines[cur-1].classList.replace('perf-active', 'perf-dim');
                lines[cur].classList.replace('perf-dim', 'perf-active');
                lines[cur].scrollIntoView({ behavior: 'smooth', block: 'center' });
                cur++;
            }, ms);
        }

        function stopPerf() {
            clearInterval(state.perf.timer);
            state.perf.active = false;
            const b = $('btn-perf');
            b.innerText = 'PERFORMANCE_OFF'; b.classList.remove('bg-white', 'text-black');
            $('output-lyrics').querySelectorAll('.flow-line').forEach(l => {
                l.classList.remove('perf-dim', 'perf-active');
            });
        }

        function renderHistory() {
            const l = $('history-list'); l.innerHTML = '';
            state.history.forEach(h => {
                const d = document.createElement('div');
                d.className = 'p-4 bg-white/5 border border-white/0 hover:border-white/10 transition-all cursor-pointer group';
                d.onclick = () => { $('input-lyrics').value = h.input; state.currentInput = h.input; state.currentOutput = h.output; renderOutput(h.output); togglePanel('history'); };
                d.innerHTML = `<div class="text-[8px] font-black opacity-30 mb-1">${h.time}</div><div class="text-xs font-bold truncate">${h.output.split('\n')[0].replace(/\[\[|\]\]/g,'')}</div>`;
                l.appendChild(d);
            });
            if (!state.history.length) l.innerHTML = '<div class="text-[10px] font-black p-4 text-center opacity-20 uppercase">NO_SESSIONS</div>';
        }

        function renderRMD() {
            const l = $('rmd-list'); l.innerHTML = '';
            state.rmd.forEach(r => {
                const d = document.createElement('div');
                d.className = 'p-4 bg-white/5 border border-white/0 hover:border-white/10 transition-all cursor-pointer group flex justify-between items-center';
                d.onclick = () => { 
                    const ta = $('input-lyrics');
                    ta.value += (ta.value ? '\n' : '') + r.chain; 
                    state.currentInput = ta.value; 
                    save(); 
                };
                d.innerHTML = `<div class="text-xs font-bold truncate pr-4">${r.chain}</div><span class="material-symbols-outlined text-xs opacity-20 group-hover:opacity-100">add</span>`;
                l.appendChild(d);
            });
            if (!state.rmd.length) l.innerHTML = '<div class="text-[10px] font-black p-4 text-center opacity-20 uppercase">EMPTY_RESERVOIR</div>';
        }

        function updateSetting(k, v) { state.settings[k] = v; applySettings(); save(); }
        function applySettings() {
            $('val-outsider').innerText = state.settings.outsiderIntensity;
            $('val-rhyme').innerText = state.settings.rhymeDensity;
            $('api-key-input').value = state.settings.apiKey || '';
            $('range-outsider').value = state.settings.outsiderIntensity;
            $('range-rhyme').value = state.settings.rhymeDensity;
            $('bpm-input').value = state.settings.bpm;
            document.querySelectorAll('.loc-btn').forEach(b => {
                const active = b.dataset.loc === state.settings.localization;
                b.classList.toggle('bg-white', active); b.classList.toggle('text-black', active);
            });
        }

        function setLoading(l, type) {
            const b = type === 'write' ? $('btn-write') : $('btn-refine');
            const bt = type === 'write' ? $('btn-write-text') : $('btn-refine-text');
            if (l) { b.classList.add('loading-pulse'); bt.innerText = 'PROC'; $('status-pixel').classList.add('animate-pulse'); $('status-text').innerText = 'UPLINKING...'; }
            else { b.classList.remove('loading-pulse'); bt.innerText = type.toUpperCase(); $('status-pixel').classList.remove('animate-pulse'); $('status-text').innerText = 'SYSTEM_CONNECTED'; }
        }

        function newSession() { if (confirm("ARCHIVE AND REWIND?")) { state.currentInput = ''; state.currentOutput = ''; state.versions = []; state.sessionId = Math.random().toString(36).slice(2, 8).toUpperCase(); $('input-lyrics').value = ''; $('output-lyrics').innerHTML = '<div class="text-white/5 italic">FEED SYSTEM DATA TO BEGIN_</div>'; save(); init(); } }
        function save() { localStorage.setItem('saveHXPE_V7', JSON.stringify(state)); }
        function clearState() { if (confirm("PURGE SYSTEM?")) { localStorage.clear(); location.reload(); } }
        function startTime() { setInterval(() => $('time-display').innerText = new Date().toTimeString().split(' ')[0], 1000); }

        init();
    </script>
</body>
</html>
